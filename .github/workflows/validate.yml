name: Validate

on:
  push:
  pull_request:

jobs:
  validate-skill:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate SKILL.md frontmatter
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import re
          p = Path("SKILL.md")
          text = p.read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              raise SystemExit("SKILL.md must start with YAML frontmatter")
          end = text.find("\n---", 4)
          if end == -1:
              raise SystemExit("SKILL.md frontmatter is not closed")
          fm = text[4:end].strip()
          values = {}
          for line in fm.splitlines():
              if ":" not in line:
                  continue
              k, v = line.split(":", 1)
              values[k.strip()] = v.strip().strip('"')
          if values.get("name") != "operate-ui-by-screenshot":
              raise SystemExit("frontmatter name must be operate-ui-by-screenshot")
          if not values.get("description"):
              raise SystemExit("frontmatter description is required")
          if not re.fullmatch(r"[a-z0-9-]+", values["name"]):
              raise SystemExit("frontmatter name must use lowercase letters, digits, and hyphens")
          print("SKILL.md frontmatter OK")
          '@ | python -

      - name: Check PowerShell scripts parse
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw -LiteralPath $_.FullName), [ref]$null)
            Write-Host "Parsed $($_.Name)"
          }
